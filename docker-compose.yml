version: '3.9'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=production
      - PORT=4000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CLIENT_URL=http://localhost:3000
    volumes:
      - ./uploads:/app/uploads
      - ./converted:/app/converted
    depends_on:
      - redis

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: node src/workers/convertWorker.js
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./uploads:/app/uploads
      - ./converted:/app/converted
    depends_on:
      - redis

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - server

volumes:
  redis_data:
